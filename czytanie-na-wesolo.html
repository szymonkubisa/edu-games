<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Czytanie na wesoło</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#3B2E58; --bg:#F6F1FF; --card:#FFFFFF;
  --teal:#2BB58A; --teal-l:#DDF5EC;
  --coral:#F4764C; --coral-l:#FDE7DE;
  --sun:#F0A11F; --sun-l:#FCEFD6;
  --pink:#EE6FA4; --pink-l:#FCE3EE;
  --violet:#8B7BE8; --violet-l:#EBE7FC;
  --red:#E24B4A; --red-l:#FADCDC;
  --green:#5CB531; --green-l:#E4F3D9;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:"Baloo 2","Comic Sans MS","Chalkboard SE",ui-rounded,system-ui,sans-serif;
  background:var(--bg); color:var(--ink);
  min-height:100vh; padding:16px;
}
.wrap{max-width:720px;margin:0 auto}
header{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
h1{font-size:clamp(20px,5vw,28px);font-weight:700;flex:1;min-width:160px}
.stars{
  display:flex;align-items:center;gap:6px;font-size:22px;font-weight:700;
  background:var(--sun-l);border:3px solid var(--sun);border-radius:999px;padding:2px 14px;color:#8A5A0A;
}
button{
  font-family:inherit;font-size:17px;font-weight:700;color:var(--ink);
  background:var(--card);border:3px solid #D9CFEF;border-radius:16px;
  padding:10px 16px;cursor:pointer;transition:transform .12s,box-shadow .12s;
  box-shadow:0 3px 0 #D9CFEF;
}
button:active{transform:translateY(2px);box-shadow:0 1px 0 #D9CFEF}
button.on{border-color:var(--violet);background:var(--violet-l);color:#4A3DA8;box-shadow:0 3px 0 var(--violet)}
a.home{
  display:inline-flex;align-items:center;justify-content:center;
  width:46px;height:46px;font-size:22px;text-decoration:none;color:var(--ink);
  background:var(--card);border:3px solid #D9CFEF;border-radius:16px;
  box-shadow:0 3px 0 #D9CFEF;
}
a.home:active{transform:translateY(2px);box-shadow:0 1px 0 #D9CFEF}
.tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tabs button{flex:1;min-width:120px;font-size:19px;padding:12px}
.tabs button.on{border-color:var(--coral);background:var(--coral-l);color:#A03D1E;box-shadow:0 3px 0 var(--coral)}
.card{background:var(--card);border-radius:24px;padding:20px;box-shadow:0 4px 14px rgba(59,46,88,.08)}
.hidden{display:none!important}

/* ---- wybory ---- */
.pickLabel{font-size:19px;font-weight:700;margin:14px 0 8px}
.pickLabel:first-child{margin-top:0}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  min-width:92px;padding:8px 10px;font-size:14px;border-radius:18px;
}
.chip .em{font-size:32px;line-height:1}
.chip.sel{border-color:var(--teal);background:var(--teal-l);color:#0E6E4F;box-shadow:0 3px 0 var(--teal)}
.goBtn{
  display:block;margin:20px auto 4px;font-size:22px;padding:14px 34px;
  border-color:var(--teal);background:var(--teal);color:#fff;box-shadow:0 4px 0 #1E8A67;
}
.goBtn:active{box-shadow:0 1px 0 #1E8A67}
.goBtn:disabled{opacity:.45;cursor:not-allowed}

/* ---- historyjka ---- */
.progress{font-size:15px;font-weight:700;color:#9A8FBE;margin-bottom:8px}
#done{font-size:18px;line-height:1.55;color:#AFA5D2;margin-bottom:10px;max-height:150px;overflow-y:auto}
#done .s{display:block}
#now{
  font-size:clamp(25px,5.6vw,34px);line-height:1.45;font-weight:700;
  min-height:100px;margin:6px 0 14px;
}
.syl0{color:var(--ink)}
.syl1{color:var(--coral)}
.storyBtns{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.readBtn{
  font-size:20px;padding:12px 24px;border-color:var(--pink);background:var(--pink);
  color:#fff;box-shadow:0 4px 0 #C24A7E;
}
.readBtn:active{box-shadow:0 1px 0 #C24A7E}
.pop{animation:pop .3s ease-out}
@keyframes pop{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.08);opacity:1}100%{transform:scale(1)}}
.wob{animation:wob .5s ease-in-out}
@keyframes wob{0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}
.shk{animation:shk .3s ease-in-out 2}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ---- quiz ---- */
.q{font-size:clamp(21px,5vw,27px);font-weight:700;margin-bottom:14px}
.opts{display:flex;gap:10px;flex-wrap:wrap}
.opt{
  flex:1;min-width:130px;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:14px;font-size:18px;border-radius:20px;
}
.opt .em{font-size:42px;line-height:1}
.opt.good{border-color:var(--green);background:var(--green-l);box-shadow:0 3px 0 var(--green)}
.opt.bad{border-color:var(--red);background:var(--red-l);box-shadow:0 3px 0 var(--red)}
.fb{font-size:20px;font-weight:700;min-height:30px;margin-top:12px}

/* ---- słowa ---- */
#wEmoji{font-size:clamp(80px,22vw,130px);text-align:center;line-height:1.2;margin:6px 0 16px;cursor:pointer}
.wordOpt{font-size:clamp(22px,5.5vw,30px);padding:14px 10px}

/* ---- czytam (karty) ---- */
#cWord{
  font-size:clamp(46px,12vw,80px);font-weight:700;text-align:center;
  line-height:1.3;min-height:110px;display:flex;align-items:center;justify-content:center;
  margin:6px 0 12px;
}
#cJudge .opt{font-size:clamp(19px,4.5vw,24px)}
#cGood,#fGood{border-color:var(--green);background:var(--green-l);color:#2E6B10;box-shadow:0 3px 0 var(--green)}
#cGood:active,#fGood:active{box-shadow:0 1px 0 var(--green)}
#cBad,#fNew{border-color:var(--sun);background:var(--sun-l);color:#8A5A0A;box-shadow:0 3px 0 var(--sun)}
#cBad:active,#fNew:active{box-shadow:0 1px 0 var(--sun)}

/* ---- śmieszne zdania ---- */
#fSent{
  font-size:clamp(24px,6vw,40px);font-weight:700;text-align:center;line-height:1.4;
  min-height:120px;display:flex;align-items:center;justify-content:center;margin:6px 0 12px;
}
#fJudge .opt{font-size:clamp(18px,4.2vw,23px)}

/* ---- konfetti ---- */
.cf{position:fixed;top:-40px;font-size:26px;pointer-events:none;z-index:9;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg)}}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <a class="home" href="index.html" aria-label="Menu">🏠</a>
  <h1 id="hTitle">📖 Czytanie na wesoło</h1>
  <button id="bLang">EN</button>
  <button id="bSyl" aria-pressed="false">Sy-la-by</button>
  <button id="bSnd" aria-label="Dźwięk">🔊</button>
  <span class="stars">⭐ <span id="starN">0</span></span>
</header>

<div class="tabs">
  <button id="tStory" class="on">📖 Historyjka</button>
  <button id="tWords">🔤 Słowa</button>
  <button id="tCards">🗣️ Czytam</button>
  <button id="tFun">😄 Śmieszne</button>
</div>

<!-- ===== WYBÓR ===== -->
<div class="card" id="pgPick">
  <div class="pickLabel" id="lblHero"></div>
  <div class="chips" id="cHero"></div>
  <div class="pickLabel" id="lblFriend"></div>
  <div class="chips" id="cFriend"></div>
  <div class="pickLabel" id="lblPlace"></div>
  <div class="chips" id="cPlace"></div>
  <div class="pickLabel" id="lblThing"></div>
  <div class="chips" id="cThing"></div>
  <button class="goBtn" id="bGo" disabled></button>
</div>

<!-- ===== CZYTANIE ===== -->
<div class="card hidden" id="pgStory">
  <div class="progress" id="prog"></div>
  <div id="done"></div>
  <div id="now"></div>
  <div class="storyBtns">
    <button class="readBtn" id="bRead"></button>
    <button id="bTts" aria-label="Posłuchaj"></button>
  </div>
</div>

<!-- ===== QUIZ ===== -->
<div class="card hidden" id="pgQuiz">
  <div class="q" id="qTxt"></div>
  <div class="opts" id="qOpts"></div>
  <div class="fb" id="qFb"></div>
</div>

<!-- ===== KONIEC ===== -->
<div class="card hidden" id="pgEnd" style="text-align:center">
  <div style="font-size:70px" class="wob">🎉</div>
  <div class="q" id="endTxt" style="margin:10px 0 18px"></div>
  <button class="goBtn" id="bAgain"></button>
</div>

<!-- ===== SŁOWA ===== -->
<div class="card hidden" id="pgWords">
  <div class="q" id="wQ" style="text-align:center"></div>
  <div id="wEmoji"></div>
  <div class="opts" id="wOpts"></div>
  <div class="fb" id="wFb" style="text-align:center"></div>
</div>

<!-- ===== CZYTAM (karty) ===== -->
<div class="card hidden" id="pgCards">
  <div class="q" id="cQ" style="text-align:center"></div>
  <div id="cWord"></div>
  <div style="display:flex;justify-content:center;margin-bottom:14px">
    <button id="cListen"></button>
  </div>
  <div class="opts" id="cJudge">
    <button class="opt" id="cGood"></button>
    <button class="opt" id="cBad"></button>
  </div>
  <div class="fb" id="cFb" style="text-align:center"></div>
</div>

<!-- ===== ŚMIESZNE ZDANIA ===== -->
<div class="card hidden" id="pgFun">
  <div class="q" id="fQ" style="text-align:center"></div>
  <div id="fSent"></div>
  <div style="display:flex;justify-content:center;margin-bottom:14px">
    <button id="fListen"></button>
  </div>
  <div class="opts" id="fJudge">
    <button class="opt" id="fGood"></button>
    <button class="opt" id="fNew"></button>
  </div>
  <div class="fb" id="fFb" style="text-align:center"></div>
</div>
</div>

<script src="store.js"></script>
<script>
/* =============== DŹWIĘKI =============== */
let snd=EduStore.get('sound',true),AC;
function ac(){if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();return AC}
function tone(f,t,d,type,g){
  if(!snd)return;const a=ac(),o=a.createOscillator(),v=a.createGain();
  o.type=type||'sine';o.frequency.value=f;
  v.gain.setValueAtTime(g||.16,a.currentTime+t);
  v.gain.exponentialRampToValueAtTime(.001,a.currentTime+t+d);
  o.connect(v);v.connect(a.destination);o.start(a.currentTime+t);o.stop(a.currentTime+t+d);
}
function popS(){tone(660,0,.12)}
function pageS(){tone(440,0,.09);tone(660,.08,.12)}
function goodS(){[523,659,784,1047].forEach((f,i)=>tone(f,i*.09,.22))}
function badS(){tone(220,0,.25,'square',.08)}
function fanfare(){[523,659,784,1047,784,1047,1319].forEach((f,i)=>tone(f,i*.11,.24))}

/* =============== TTS =============== */
function say(txt){
  if(!('speechSynthesis' in window)||!txt)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt.replace(/\|/g,''));
  const code=lang==='pl'?'pl':'en';
  u.lang=lang==='pl'?'pl-PL':'en-US';u.rate=.82;u.pitch=1.05;
  const v=speechSynthesis.getVoices().find(v=>v.lang&&v.lang.startsWith(code));
  if(v)u.voice=v;
  speechSynthesis.speak(u);
}
if('speechSynthesis' in window)speechSynthesis.getVoices();

/* =============== SYLABY =============== */
let sylOn=EduStore.get('syllables',false);
function render(txt){
  return txt.split(' ').map(w=>{
    if(!sylOn)return '<span class="w">'+w.replace(/\|/g,'')+'</span>';
    const parts=w.split('|');
    return '<span class="w">'+parts.map((p,i)=>'<span class="syl'+(i%2)+'">'+p+'</span>').join('')+'</span>';
  }).join(' ');
}
function plain(t){return t.replace(/\|/g,'')}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1)}

/* =============== WYBÓR =============== */
function buildChips(){
  const d=D();
  const groups=[['cHero',d.HEROES,'h'],['cFriend',d.FRIENDS,'f'],['cPlace',d.PLACES,'p'],['cThing',d.THINGS,'t']];
  groups.forEach(([elId,list,key])=>{
    const el=$(elId);el.innerHTML='';
    list.forEach(item=>{
      const b=document.createElement('button');
      b.className='chip';
      b.innerHTML='<span class="em">'+item.em+'</span><span>'+plain(item.nom)+'</span>';
      b.addEventListener('click',()=>{
        popS();
        sel[key]=item;
        [...el.children].forEach(c=>c.classList.remove('sel'));
        b.classList.add('sel');
        $('bGo').disabled=!(sel.h&&sel.f&&sel.p&&sel.t);
      });
      el.appendChild(b);
    });
  });
}

$('bGo').addEventListener('click',()=>{
  tone(523,0,.15);tone(784,.12,.2);
  const all=D().stories(sel.h,sel.f,sel.p,sel.t);
  story=all[Math.floor(Math.random()*all.length)];
  idx=0;
  buildQuestions();
  show('pgStory');
  renderStory();
});

/* =============== CZYTANIE =============== */
function renderStory(){
  const u=UI();
  $('prog').textContent=u.sentence(idx+1,story.s.length);
  $('done').innerHTML=story.s.slice(0,idx).map(s=>'<span class="s">'+plain(s)+'</span>').join('');
  $('done').scrollTop=$('done').scrollHeight;
  const nowEl=$('now');
  nowEl.innerHTML=render(story.s[idx]);
  nowEl.classList.remove('pop');void nowEl.offsetWidth;nowEl.classList.add('pop');
  $('bRead').textContent = idx===story.s.length-1 ? u.readLast : u.read;
}
$('bRead').addEventListener('click',()=>{
  pageS();
  if(idx<story.s.length-1){idx++;renderStory()}
  else{qIdx=0;show('pgQuiz');quiz()}
});
$('bTts').addEventListener('click',()=>say(story.s[idx]));

/* =============== QUIZ =============== */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function fromList(list,ok,lbl){
  const others=shuffle(list.filter(x=>x!==ok)).slice(0,2);
  return shuffle([ok,...others]).map(x=>({em:x.em,lbl:lbl(x),ok:x===ok}));
}
function buildQuestions(){
  const d=D(),u=UI();
  questions=[
   {txt:u.qHero, opts:fromList(d.HEROES,sel.h,x=>x.nom)},
   {txt:u.qPlace,opts:fromList(d.PLACES,sel.p,x=>x.nom)},
   {txt:u.qThing,opts:fromList(d.THINGS,sel.t,x=>x.nom)},
  ];
  const pq=story?story.q:null;
}
function plotQuestion(){
  const d=D(),pq=story.q;
  if(pq.list==='F')return {txt:pq.txt,opts:fromList(d.FRIENDS,pq.ok,x=>x.nom)};
  return {txt:pq.txt,opts:shuffle([...pq.opts])};
}
function quiz(){
  lock=false;$('qFb').textContent='';
  const u=UI();
  const Q = qIdx<3 ? questions[qIdx] : plotQuestion();
  $('qTxt').innerHTML=render(Q.txt);
  const opts=$('qOpts');opts.innerHTML='';
  Q.opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML='<span class="em">'+o.em+'</span><span>'+render(o.lbl)+'</span>';
    b.addEventListener('click',()=>{
      if(lock)return;
      if(o.ok){
        lock=true;b.classList.add('good');goodS();
        stars=EduStore.addStar('reading').count;bumpStars();
        $('qFb').textContent=u.bravo;
        setTimeout(()=>{
          qIdx++;
          if(qIdx<4)quiz();
          else finish();
        },1100);
      }else{
        b.classList.add('bad','shk');badS();
        $('qFb').textContent=u.retry;
        setTimeout(()=>b.classList.remove('bad','shk'),900);
      }
    });
    opts.appendChild(b);
  });
}
function bumpStars(){
  $('starN').textContent=stars;
  const s=$('starN').parentElement;
  s.classList.remove('wob');void s.offsetWidth;s.classList.add('wob');
}
function finish(){
  show('pgEnd');
  $('endTxt').textContent=UI().end(stars);
  fanfare();confetti();
}
$('bAgain').addEventListener('click',resetPick);
function resetPick(){
  sel={h:null,f:null,p:null,t:null};
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));
  $('bGo').disabled=true;
  show('pgPick');
}

/* =============== KONFETTI =============== */
function confetti(){
  const ems=['⭐','🎉','💜','🌸','✨','📖'];
  for(let i=0;i<26;i++){
    const d=document.createElement('div');
    d.className='cf';d.textContent=ems[i%ems.length];
    d.style.left=Math.random()*100+'vw';
    d.style.animationDuration=(2+Math.random()*2)+'s';
    d.style.animationDelay=(Math.random()*.6)+'s';
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),5200);
  }
}
